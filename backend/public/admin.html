<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Tramway</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#06111f;color:#e8f4fd;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:480px}
h1{font-size:22px;color:#00d4ff;text-align:center;margin-bottom:8px}
.subtitle{text-align:center;color:#5d7a96;font-size:13px;margin-bottom:30px}
.card{background:#112540;border:1px solid rgba(0,212,255,0.15);border-radius:16px;padding:24px;margin-bottom:16px}
.card h2{font-size:14px;color:#00d4ff;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
label{display:block;font-size:12px;color:#5d7a96;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
input{width:100%;background:#0d1f35;border:1px solid rgba(0,212,255,0.2);border-radius:10px;padding:12px 16px;color:#e8f4fd;font-size:14px;outline:none;margin-bottom:16px}
input:focus{border-color:#00d4ff}
button{width:100%;background:linear-gradient(135deg,#0099cc,#00d4ff);border:none;border-radius:10px;padding:14px;color:#06111f;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px}
button:hover{opacity:0.9}
.msg{padding:12px 16px;border-radius:10px;font-size:13px;margin-top:16px;text-align:center;display:none}
.msg.success{background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);color:#00e676}
.msg.error{background:rgba(255,82,82,0.1);border:1px solid rgba(255,82,82,0.3);color:#ff5252}
.cards-list{margin-top:16px}
.card-item{background:#0d1f35;border:1px solid rgba(0,212,255,0.1);border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.card-item .name{font-size:14px;font-weight:600}
.card-item .num{font-size:12px;color:#5d7a96;font-family:monospace}
.badge{background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);color:#00e676;font-size:10px;padding:3px 8px;border-radius:20px}
</style>
</head>
<body>
<div class="container">
  <h1>🚋 Admin Tramway</h1>
  <p class="subtitle">Gestion des cartes autorisées</p>

  <div class="card">
    <h2>➕ Enregistrer une carte</h2>
    <label>Clé Admin</label>
    <input type="password" id="adminKey" placeholder="Clé secrète admin">
    <label>Numéro de carte bancaire</label>
    <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
    <label>Nom du titulaire</label>
    <input type="text" id="ownerName" placeholder="Nom complet">
    <button onclick="registerCard()">Enregistrer la carte</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
async function registerCard() {
  var adminKey = document.getElementById('adminKey').value.trim();
  var cardNumber = document.getElementById('cardNumber').value.replace(/\s/g,'').trim();
  var ownerName = document.getElementById('ownerName').value.trim();
  var msg = document.getElementById('msg');

  if (!adminKey || !cardNumber || !ownerName) {
    showMsg('error', 'Remplissez tous les champs');
    return;
  }

  if (cardNumber.length < 13 || cardNumber.length > 19) {
    showMsg('error', 'Numéro de carte invalide');
    return;
  }

  try {
    var res = await fetch('/api/admin/register-card', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminKey, cardNumber, ownerName })
    });
    var data = await res.json();

    if (data.success) {
      showMsg('success', 'Carte **** ' + data.cardLast4 + ' enregistrée pour ' + ownerName);
      document.getElementById('cardNumber').value = '';
      document.getElementById('ownerName').value = '';
    } else {
      showMsg('error', data.error || 'Erreur');
    }
  } catch(e) {
    showMsg('error', 'Erreur de connexion');
  }
}

function showMsg(type, text) {
  var msg = document.getElementById('msg');
  msg.className = 'msg ' + type;
  msg.textContent = text;
  msg.style.display = 'block';
  setTimeout(function(){ msg.style.display = 'none'; }, 4000);
}

document.getElementById('cardNumber').addEventListener('input', function(e) {
  var v = e.target.value.replace(/\D/g,'').substring(0,16);
  e.target.value = v.replace(/(.{4})/g,'$1 ').trim();
});
</script>
</body>
</html>
