<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription - Tramway</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#06111f;color:#e8f4fd;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:420px}
.logo{text-align:center;margin-bottom:30px}
.logo-icon{font-size:48px}
.logo-title{font-size:22px;font-weight:700;color:#00d4ff;letter-spacing:2px;margin-top:8px}
.logo-sub{font-size:12px;color:#5d7a96;margin-top:4px}
.card{background:#112540;border:1px solid rgba(0,212,255,0.15);border-radius:16px;padding:24px}
.card h2{font-size:14px;color:#00d4ff;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;text-align:center}
label{display:block;font-size:11px;color:#5d7a96;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
input{width:100%;background:#0d1f35;border:1px solid rgba(0,212,255,0.2);border-radius:10px;padding:12px 16px;color:#e8f4fd;font-size:14px;outline:none;margin-bottom:14px}
input:focus{border-color:#00d4ff}
.btn{width:100%;background:linear-gradient(135deg,#0099cc,#00d4ff);border:none;border-radius:10px;padding:14px;color:#06111f;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.btn:hover{opacity:0.9}
.msg{padding:12px;border-radius:10px;font-size:13px;margin-top:14px;text-align:center;display:none}
.msg.success{background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);color:#00e676}
.msg.error{background:rgba(255,82,82,0.1);border:1px solid rgba(255,82,82,0.3);color:#ff5252}
.login-link{text-align:center;margin-top:16px;font-size:13px;color:#5d7a96}
.login-link a{color:#00d4ff;text-decoration:none}
.note{font-size:11px;color:#5d7a96;margin-top:-10px;margin-bottom:14px}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-icon">🚋</div>
    <div class="logo-title">TRAMWAY</div>
    <div class="logo-sub">Créer votre compte</div>
  </div>

  <div class="card">
    <h2>✍️ Inscription</h2>

    <label>Nom complet</label>
    <input type="text" id="name" placeholder="Votre nom">

    <label>Email</label>
    <input type="email" id="email" placeholder="exemple@email.com">

    <label>Téléphone</label>
    <input type="tel" id="phone" placeholder="06XXXXXXXX">

    <label>Numéro de carte bancaire</label>
    <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
    <p class="note">⚠️ Carte utilisée pour payer dans le tramway</p>

    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="Minimum 6 caractères">

    <button class="btn" onclick="register()">Créer mon compte</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="login-link">
    Déjà un compte ? <a href="/login">Se connecter</a>
  </div>
</div>

<script>
async function register() {
  var name = document.getElementById('name').value.trim();
  var email = document.getElementById('email').value.trim();
  var phone = document.getElementById('phone').value.trim();
  var cardNumber = document.getElementById('cardNumber').value.replace(/\s/g,'').trim();
  var password = document.getElementById('password').value;

  if (!name || !email || !cardNumber || !password) {
    showMsg('error', 'Remplissez tous les champs obligatoires');
    return;
  }
  if (password.length < 6) {
    showMsg('error', 'Mot de passe trop court (min 6 caractères)');
    return;
  }
  if (cardNumber.length < 13) {
    showMsg('error', 'Numéro de carte invalide');
    return;
  }

  try {
    var res = await fetch('/api/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, email, phone, cardNumber, password})
    });
    var data = await res.json();

    if (data.success) {
      showMsg('success', 'Compte créé ! Redirection...');
      setTimeout(function(){ window.location.href = '/login'; }, 2000);
    } else {
      showMsg('error', data.error || 'Erreur');
    }
  } catch(e) {
    showMsg('error', 'Erreur de connexion');
  }
}

function showMsg(type, text) {
  var msg = document.getElementById('msg');
  msg.className = 'msg ' + type;
  msg.textContent = text;
  msg.style.display = 'block';
}

document.getElementById('cardNumber').addEventListener('input', function(e) {
  var v = e.target.value.replace(/\D/g,'').substring(0,16);
  e.target.value = v.replace(/(.{4})/g,'$1 ').trim();
});
</script>
</body>
</html>
